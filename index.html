<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>TaskFlow</title>

  <!-- FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="./css/auth.css"
  >

</head>

<body>

  <!-- BACKGROUND -->
  <div class="bg"></div>

  <div class="main-container">

    <!-- LEFT SIDE -->
    <div class="left-panel">

      <div class="overlay"></div>

      <div class="left-content">

        <h1>TaskFlow</h1>

        <p>
          Organize tasks beautifully and boost
          your productivity with modern workflow
          management.
        </p>

      </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="right-panel">

      <form
        class="login-card"
        id="loginForm"
      >

        <h2>Welcome Back</h2>

        <p class="login-text">
          Login to continue your workflow
        </p>

        <div class="input-box">

          <input
            type="email"
            id="email"
            placeholder="Email Address"
            required
          >

        </div>

        <div class="input-box">

          <input
            type="password"
            id="password"
            placeholder="Password"
            required
          >

        </div>

        <button type="submit">
          Login
        </button>

        <div class="bottom-link">

          Don't have an account?

          <a href="register.html">
            Register
          </a>

        </div>

        <!-- SOCIALS -->
        <div class="socials">

          <a href="https://github.com/spraneethreddy06">
            <img
              src="./assets/github.png"
              alt="GitHub"
            >
          </a>

          <a href="https://www.linkedin.com/in/sudini-praneeth-reddy-48595340a?utm_source=share_via&utm_content=profile&utm_medium=member_android" target="_blank">
            <img
              src="./assets/linkedin.png"
              alt="LinkedIn"
            >
          </a>

          <a href="https://www.instagram.com/sudinipraneethreddy?utm_source=qr&igsh=MTFpbW93Y3Blajlqaw==">
            <img
              src="./assets/instagram.png"
              alt="Instagram"
            >
          </a>

          <a href="mailto:spraneethreddychintu@gmail.com">
            <img
              src="./assets/email.png"
              alt="Email"
            >
          </a>

        </div>

      </form>

    </div>

  </div>

  <script src="./js/login.js"></script>
<!-- FOOTER -->
<footer class="footer">

  <p>
    © 2026 TaskFlow. Built with ❤️ by praneeth
  </p>

</footer>
</body>
</html>
