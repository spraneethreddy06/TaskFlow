<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>TaskFlow Register</title>

  <!-- GOOGLE FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="./css/auth.css"
  >

</head>

<body>

  <!-- BACKGROUND -->
  <div class="bg"></div>

  <div class="main-container">

    <!-- LEFT SIDE -->
    <div class="left-panel">

      <div class="left-content">

        <h1>
          TaskFlow
        </h1>

        <p>
          Create your account and start
          organizing tasks with a modern
          productivity workspace.
        </p>

      </div>

    </div>


    <!-- RIGHT SIDE -->
    <div class="right-panel">

      <form
        class="login-card"
        id="registerForm"
      >

        <h2>
          Create Account
        </h2>

        <p class="login-text">
          Register to continue your workflow
        </p>


        <!-- NAME -->
        <div class="input-box">

          <input
            type="text"
            id="name"
            placeholder="Full Name"
            required
          >

        </div>


        <!-- EMAIL -->
        <div class="input-box">

          <input
            type="email"
            id="email"
            placeholder="Email Address"
            required
          >

        </div>


        <!-- PASSWORD -->
        <div class="input-box">

          <input
            type="password"
            id="password"
            placeholder="Password"
            required
          >

        </div>


        <!-- BUTTON -->
        <button type="submit">
          Register
        </button>


        <!-- LOGIN LINK -->
        <div class="bottom-link">

          Already have an account?

          <a href="login.html">
            Login
          </a>

        </div>


        <!-- SOCIALS -->
        <div class="socials">

          <a href="https://github.com/spraneethreddy06">
            <img
              src="./assets/github.png"
              alt="GitHub"
            >
          </a>

          <a href="https://www.linkedin.com/in/sudini-praneeth-reddy-48595340a?utm_source=share_via&utm_content=profile&utm_medium=member_android" target="_blank">
            <img
              src="./assets/linkedin.png"
              alt="LinkedIn"
            >
          </a>

          <a href="https://www.instagram.com/sudinipraneethreddy?utm_source=qr&igsh=MTFpbW93Y3Blajlqaw==">
            <img
              src="./assets/instagram.png"
              alt="Instagram"
            >
          </a>

          <a href="mailto:spraneethreddychintu@gmail.com">
            <img
              src="./assets/email.png"
              alt="Email"
            >
          </a>

        </div>

      </form>

    </div>

  </div>

  <!-- JS -->
  <script src="./js/register.js"></script>
<!-- FOOTER -->
<footer class="footer">

  <p>
    © 2026 TaskFlow. Built with ❤️ by praneeth
  </p>

</footer>
</body>
</html>
